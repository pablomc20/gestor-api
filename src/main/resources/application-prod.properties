# ==========================================
# PRODUCTION CONFIGURATION
# ==========================================
spring.application.title=Gestor API - Production

# ----------------------------------------
# DATABASE CONNECTION (Prod variables)
# ----------------------------------------
spring.datasource.url=${POSTGRE_SQL_URI}
spring.datasource.username=${POSTGRE_SQL_USER}
spring.datasource.password=${POSTGRE_SQL_PASSWORD}

# HikariCP specific for Prod (Performance tuning)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA / HIBERNATE (Strictly NONE in prod to avoid accidental dropping)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ----------------------------------------
# SERVER
# ----------------------------------------
# Usa el puerto configurado o 8082 por defecto
server.port=${SERVER_PORT_BACK:8082}

# ----------------------------------------
# SECURITY & CORS
# ----------------------------------------
jwt-secret=${JWT_SECRET}
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ----------------------------------------
# LOGGING (Clean logs for prod)
# ----------------------------------------
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF

# ----------------------------------------
# MINIO (Strictly Env variables, no fallbacks)
# ----------------------------------------
minio.url=${MINIO_ENDPOINT}
minio.access.key=${MINIO_ACCESS_KEY}
minio.secret.key=${MINIO_SECRET_KEY}
minio.bucket.name=${MINIO_BUCKET_NAME}
